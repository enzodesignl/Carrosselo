<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrosselo App</title>
<style>
body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:#fff8f2;
display:grid;
place-items:center;
min-height:100vh;
padding:40px;
}
.container{
width:min(980px,100%);
display:grid;
grid-template-columns:380px 1fr;
gap:24px;
}
.panel{
background:white;
border-radius:32px;
padding:28px;
border:1px solid #f0dfd2;
box-shadow:0 24px 80px rgba(255,106,0,.08);
}
.logo{
display:flex;
align-items:center;
gap:12px;
font-size:32px;
font-weight:900;
letter-spacing:-0.08em;
margin-bottom:30px;
}
.logo img{
width:52px;
height:52px;
border-radius:18px;
}
.logo span{
color:#ff6a00;
}
h2{
font-size:38px;
line-height:.92;
letter-spacing:-0.08em;
margin-bottom:20px;
}
label{
display:block;
margin-bottom:10px;
font-weight:800;
}
input,select{
width:100%;
padding:16px;
border-radius:16px;
border:1px solid #f0dfd2;
margin-bottom:18px;
font-size:16px;
}
button{
width:100%;
padding:18px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,#ff6a00,#ff9a3c);
color:white;
font-size:16px;
font-weight:900;
cursor:pointer;
}
.preview{
background:#111;
color:white;
border-radius:32px;
padding:28px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
.preview h3{
font-size:42px;
line-height:.92;
letter-spacing:-0.08em;
}
@media(max-width:920px){
.container{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="container">

<div class="panel">

<div class="logo">
<img src="logo-carrosselo.jpeg">
<div>carross<span>elo</span></div>
</div>

<h2>Gerar carrossel</h2>

<label>Tema</label>
<input type="text" placeholder="Ex: identidade visual">

<label>Nicho</label>
<input type="text" placeholder="Ex: empreendedores">

<label>Objetivo</label>
<select>
<option>Gerar autoridade</option>
<option>Vender</option>
<option>Engajar</option>
</select>

<button>
Gerar carrossel
</button>

</div>

<div class="preview">
<div>
<h3>
Sua prévia do carrossel aparecerá aqui.
</h3>
</div>
</div>

</div>

</body>
</html>
